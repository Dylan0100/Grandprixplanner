<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Icons & Manifest -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#E8002D" />

    <!-- Primary Meta -->
    <title>Grand Prix Planner — Plan Your F1 Race Weekend</title>
    <meta name="description" content="The only tool that plans your entire F1 race weekend in one place. Compare grandstands, estimate costs, check visas, find flights and hotels — free to use." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.grandprixplanner.com" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.grandprixplanner.com" />
    <meta property="og:title" content="Grand Prix Planner — Plan Your F1 Race Weekend" />
    <meta property="og:description" content="Stop spending days across dozens of websites. Plan your entire F1 race weekend — flights, hotels, tickets, grandstands, visas and transport — all in one place. Free to use." />
    <meta property="og:image" content="https://www.grandprixplanner.com/og-image.jpg" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.grandprixplanner.com" />
    <meta name="twitter:title" content="Grand Prix Planner — Plan Your F1 Race Weekend" />
    <meta name="twitter:description" content="Stop spending days across dozens of websites. Plan your entire F1 race weekend — flights, hotels, tickets, grandstands, visas and transport — all in one place. Free to use." />
    <meta name="twitter:image" content="https://www.grandprixplanner.com/og-image.jpg" />

    <!-- Structured Data — WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Grand Prix Planner",
      "url": "https://www.grandprixplanner.com",
      "description": "The only tool that plans your entire F1 race weekend in one place. Compare grandstands, estimate costs, check visas, find flights and hotels.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.grandprixplanner.com/plan",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Grand Prix Planner",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web",
      "url": "https://www.grandprixplanner.com",
      "description": "Plan your F1 race weekend in one place. Grandstand picker, cost estimator, visa checker, flight guide, local transport and itinerary builder for all 22 races.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
